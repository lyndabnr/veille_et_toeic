name: TOEIC Morning Challenge

on:
  schedule:
    # Runs daily around 08:00 AM Paris Time (scheduled at 05:52 UTC to avoid peak-hour queue delay)
    - cron: '52 5 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run TOEIC Morning Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_TOEIC || secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_TOEIC || secrets.TELEGRAM_CHAT_ID }}
        run: python english_toeic_bot.py --morning
