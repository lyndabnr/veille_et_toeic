name: Cybersecurity News Watch

on:
  schedule:
    # Runs daily around 09:00 AM Paris Time (scheduled at 06:52 UTC to avoid peak-hour queue delay)
    - cron: '52 6 * * *'
    # Runs daily around 11:05 PM Paris Time (scheduled at 21:02 UTC to avoid peak-hour queue delay)
    - cron: '2 21 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Cyber Watch Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_WATCH || secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_WATCH || secrets.TELEGRAM_CHAT_ID }}
        run: python security_audit.py --fetch-news
