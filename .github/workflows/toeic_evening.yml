name: TOEIC Evening Challenge

on:
  schedule:
    # Runs at 18:00 UTC (08:00 PM Paris Summer Time / 07:00 PM Winter Time)
    - cron: '0 18 * * *'
    # Runs daily at 21:05 UTC (23:05 PM Paris Time)
    - cron: '5 21 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run TOEIC Evening Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_TOEIC || secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_TOEIC || secrets.TELEGRAM_CHAT_ID }}
        run: python english_toeic_bot.py --evening
