name: TOEIC Evening Challenge

on:
  schedule:
    # Runs daily around 08:00 PM Paris Time (scheduled at 17:52 UTC to avoid peak-hour queue delay)
    - cron: '52 17 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run TOEIC Evening Bot
        env:
          TELEGRAM_BOT_TOKEN_TOEIC: ${{ secrets.TELEGRAM_BOT_TOKEN_TOEIC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_TOEIC: ${{ secrets.TELEGRAM_CHAT_ID_TOEIC }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python english_toeic_bot.py --evening
